{% extends 'base.html' %}

{% block content %}
<main>
    <section id="about" class="section">
        <div class="container">
            <h2>About us</h2>
            <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit.</p>
        </div>
    </section>

    <section id="blog" class="section">
        <div class="container">
            <h2>Blog</h2>
            <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit.</p>
        </div>
    </section>

    <section id="contact-us" class="section">
        <div class="container">
            <h2>Contact us</h2>
            <form action="POST">
                <input type="text" class="input-contact" name="First-name" placeholder="First name">
                <input type="text" class="input-contact" name="Last-name" placeholder="Last name">
                <input type="email" class="input-contact" name="email" placeholder="Email">
                <textarea name="message" class="messagebox" placeholder="Message"></textarea>
                <button type="submit" class="contact-btn">Send</button>
            </form>
        </div>
    </section>

    <!-- Scroll Button -->
    <div class="scroll-hint">
        <a href="javascript:void(0);" id="scroll-btn">Scroll down!</a> <!-- Prevents page reload -->
        <div class="arrow"></div>
    </div>
</main>
{% endblock %}
